# MasterClaw — microClaw Configuration Example
#
# Copy this file to /root/microclaw.config.yaml and fill in your values.
# See docs/setup.md for detailed instructions.
#
# NEVER commit this file with real tokens to a public repository.

channels:
  web:
    enabled: true
    # Web UI (gateway on localhost:10961) — useful for local testing without Discord/Telegram.
    # Without a soul the gateway falls back to a generic assistant, which is NOT the game master.
    # Point it at gamemaster.md for playtesting, or operator.md if you prefer an admin console.
    soul_path: "/root/.microclaw/souls/gamemaster.md"

  telegram:
    enabled: true
    default_account: "main"
    accounts:
      main:
        enabled: true
        # Your Telegram user ID (get it from @userinfobot)
        allowed_user_ids:
        - 123456789
        # Telegram bot token from @BotFather
        bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
        bot_username: "MasterClaw"
        # Operator soul — management interface
        soul_path: "/root/.microclaw/souls/operator.md"

  discord:
    enabled: true
    default_account: "main"
    accounts:
      main:
        enabled: true
        # Game Master soul — player-facing
        soul_path: "/root/.microclaw/souls/gamemaster.md"
        # Set to true to respond without @mention in allowed channels
        no_mention: true
        # Discord channel IDs where the bot is allowed to respond
        # Get channel ID: Discord → Settings → Advanced → Developer Mode → Right-click channel → Copy Channel ID
        allowed_channels:
        - 000000000000000000    # Replace with your game channel ID
        # Discord bot token from Discord Developer Portal
        bot_token: "YOUR_DISCORD_BOT_TOKEN"

# LLM provider configuration
# Supports: openrouter, openai, anthropic, ollama, deepseek, google, and more
# See microClaw docs for full list.
#
# Model choice is a tradeoff between cost and reliability — see "Model tier notes" in CLAUDE.md.
# The value below is an example; pick a model that fits your budget and test it on a throwaway game
# before running a real campaign.
llm_provider: "openrouter"
api_key: "YOUR_LLM_API_KEY"
model: "x-ai/grok-4.1-fast"
llm_base_url: "https://openrouter.ai/api/v1"

# Subagent settings (defaults are fine for most setups)
subagents:
  max_concurrent: 4
  max_active_per_chat: 5
  run_timeout_secs: 900
  announce_to_chat: true
  max_spawn_depth: 1
  max_children_per_run: 5
  thread_bound_routing_enabled: true
  announce_relay_interval_secs: 15
  max_tokens_per_run: 400000

# Control chats — elevated permissions (cross-channel send_message, global memory, etc.)
# Add game channel IDs here to enable narrative channel feature
control_chat_ids:
# - 000000000000000000    # Uncomment and replace with your game channel ID

# Data directories
data_dir: "/root/.microclaw"
working_dir: "/root/.microclaw/working_dir"
working_dir_isolation: shared
souls_dir: "/root/.microclaw/souls"

# Show LLM thinking/reasoning in responses (useful for debugging)
show_thinking: false

# Require user confirmation for high-risk tool calls (bash, file writes)
high_risk_tool_user_confirmation_required: true

# Sandbox mode for bash execution ("off", "docker", etc.)
sandbox:
  mode: "off"

# Memory reflector — extracts structured memories from conversations
reflector_enabled: true
reflector_interval_mins: 15
memory_token_budget: 1500
